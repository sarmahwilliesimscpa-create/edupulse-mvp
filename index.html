<!DOCTYPE html>
<html lang="en">
<head>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Your body content -->
  <script>
    // Add at top of existing <script>
    const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';
    const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY_HERE';
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Replace loadStudents() function
    async function loadStudents() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { alert('Please login'); return; }
      
      const { data, error } = await supabase
        .from('students')
        .select('*')
        .eq('school_id', session.user.app_metadata.school_id);
      
      // Your existing populate table code with 'data'
      populateStudentsTable(data || []);
    }

    // Add student button click
    document.querySelector('.btn-primary[onclick*="add-student"]').onclick = async () => {
      const formData = { first_name: 'New', last_name: 'Student', grade: '10' };
      const { data: { session } } = await supabase.auth.getSession();
      await supabase.from('students').insert([{
        ...formData,
        school_id: session.user.app_metadata.school_id
      }]);
      loadStudents(); // Refresh table
    };

    // Call on load
    window.onload = loadStudents;
  </script>
</body>
</html>
